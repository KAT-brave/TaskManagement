# =============================================================================
# frontend/nginx.conf
# =============================================================================
# Nginx = 高性能なWebサーバー・リバースプロキシ
# React (SPA) の配信と、バックエンドAPIへのプロキシを担当する
#
# このファイルが必要な理由:
#   React は SPA（Single Page Application）= index.html が1つだけ
#   ユーザーが /boards/123 に直接アクセスすると、Nginx がそのパスのファイルを
#   探してしまい 404 になる → try_files で必ず index.html を返すようにする

server {
    listen 80;
    server_name _;

    # 静的ファイルの配信ルート
    root /usr/share/nginx/html;
    index index.html;

    # ========================================================================
    # API プロキシ設定
    # ========================================================================
    # /api/ 始まりのリクエストをバックエンド（Spring Boot）に転送する
    # これにより、フロントエンドとバックエンドが同一オリジンに見える
    # → CORS（Cross-Origin Resource Sharing）の問題を回避できる
    #
    # ECS 環境では BACKEND_URL 環境変数でバックエンドのURLを切り替える
    # （起動時に envsubst で置換する）

    location /api/ {
        proxy_pass http://backend:8080;  # ECS サービス間通信（同一タスク or サービスディスカバリ）
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # タイムアウト設定
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # ========================================================================
    # ヘルスチェックエンドポイント
    # ========================================================================
    # ALB のヘルスチェックはこのパスに HTTP GET を送る
    location /health {
        access_log off;  # ヘルスチェックのログは不要
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ========================================================================
    # SPA ルーティング対応
    # ========================================================================
    # /api/ と /health 以外はすべて index.html を返す
    # React Router がクライアント側でルーティングを処理する
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ========================================================================
    # 静的ファイルのキャッシュ設定
    # ========================================================================
    # JS/CSS/画像など、ファイル名にハッシュが付くものは長期キャッシュ
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ========================================================================
    # セキュリティヘッダー
    # ========================================================================
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # エラーページ
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
