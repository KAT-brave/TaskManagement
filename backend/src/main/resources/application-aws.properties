# =============================================================================
# AWS 環境用の設定（application-aws.properties）
# =============================================================================
# このファイルは application.properties を上書きする「プロファイル」です。
#
# 使い方:
#   Spring Boot 起動時に以下の環境変数を設定する
#   SPRING_PROFILES_ACTIVE=aws
#
# ECS Fargate の場合、タスク定義の環境変数に設定する
#
# 各接続情報は ECS タスク定義の環境変数から読み込む
# 環境変数名は ${VARIABLE_NAME} の形式で参照できる

# =============================================================================
# データベース接続設定（RDS）
# =============================================================================
# RDSのエンドポイントは terraform output spring_datasource_url で確認できる
# 例: jdbc:postgresql://taskmanagement-db.xxxx.ap-northeast-1.rds.amazonaws.com:5432/taskmanagement

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# =============================================================================
# JPA / Hibernate 設定
# =============================================================================
# AWS環境では DDL の自動変更を無効化する（Flywayなどのマイグレーションツールを使うべき）
# 学習段階では update のままでもOK（本番前に none か validate に変更する）
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false      # 本番ではSQLログを出力しない（パフォーマンス・セキュリティ）

# =============================================================================
# ロギング設定
# =============================================================================
# ECS環境ではCloudWatch Logsにログが送られる
# JSONフォーマットにするとCloudWatch Logs Insightsで検索しやすくなる
logging.level.root=INFO
logging.level.com.example=INFO

# =============================================================================
# アクチュエーター（ヘルスチェック）
# =============================================================================
# ALBのヘルスチェックに使用する
# /actuator/health エンドポイントを有効化する
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
